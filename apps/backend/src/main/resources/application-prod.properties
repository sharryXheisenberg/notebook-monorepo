# Aiven for MySQL free tier - full connection string set via env var on Render,
# not hardcoded here. Aiven requires SSL; do not disable it.
spring.datasource.url=${DATABASE_URL}
spring.datasource.username=${DATABASE_USERNAME}
spring.datasource.password=${DATABASE_PASSWORD}
spring.datasource.driver-class-name=com.mysql.cj.jdbc.Driver

# Aiven free tier caps total connections - keep this conservative
spring.datasource.hikari.maximum-pool-size=5

spring.jpa.hibernate.ddl-auto=validate
spring.jpa.show-sql=false

logging.level.com.notebook.api=INFO
logging.level.org.hibernate.SQL=WARN
