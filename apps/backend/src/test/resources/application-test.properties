# Test profile: H2 in-memory, schema generated from entities directly.
# Flyway is disabled here because its migrations use MySQL-specific syntax
# (ENGINE=InnoDB, JSON columns) that H2 doesn't accept as-is - see Testing_Strategy.md.
# This means these tests validate entity/repository behavior, NOT that the actual
# Flyway migration scripts are correct. Testing_Strategy.md's separate CI check
# ("run migrations against a fresh instance on every PR") is what covers that gap.

spring.datasource.url=jdbc:h2:mem:notebook_test;MODE=MySQL;DB_CLOSE_DELAY=-1
spring.datasource.driver-class-name=org.h2.Driver
spring.flyway.enabled=false
spring.jpa.hibernate.ddl-auto=create-drop
spring.jpa.show-sql=false

app.jwt.secret=dGVzdC1zZWNyZXQta2V5LWZvci11bml0LXRlc3RzLW9ubHktMzJieXRlcw==
app.jwt.expiration-ms=3600000
app.ai.openrouter-api-key=test-key
app.ai.openrouter-base-url=https://openrouter.ai/api/v1
app.ai.rate-limit.capacity=5
app.ai.rate-limit.refill-per-minute=5
app.cors.allowed-origins=http://localhost:3000
app.frontend.base-url=http://localhost:3000